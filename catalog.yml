# agentops-skills 机器可读清单
# 字段：repo=公开仓；install_name=安装到 skills 目录的名字；requires=硬依赖（缺了不可用）；
#       recommends=软关联（缺了降级可用，降级行为写在各 skill 正文）；platforms=适用平台目录
# 目标目录：claude=~/.claude/skills/  codex=~/.codex/skills/
skills:
